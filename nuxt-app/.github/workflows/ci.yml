name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nuxt-app/package-lock.json

      - name: 패키지 설치
        run: |
          cd nuxt-app
          npm install

      - name: 빌드 테스트
        run: |
          cd nuxt-app
          npm run build